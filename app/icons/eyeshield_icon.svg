        fill="none" stroke="black" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Highlight dot -->
  <circle cx="260" cy="120" r="13" fill="black"/>
  <!-- Iris -->
  <circle cx="260" cy="260" r="88" fill="none" stroke="black" stroke-width="28"/>
  <!-- Pupil -->
  <circle cx="260" cy="260" r="40" fill="none" stroke="black" stroke-width="26"/>
  <!-- White backing for cross -->
  <rect x="340" y="325" width="162" height="178" fill="white"/>
  <!-- Medical cross (filled, fully within canvas) -->
